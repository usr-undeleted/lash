name: Commit Pager
on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get diff
        id: diff
        run: |
          DIFF=$(git diff HEAD~1 HEAD 2>/dev/null || true)
          COMMIT_MSG=$(git log -1 --pretty=format:"%s%n%b")
          COMMITTER=$(git log -1 --pretty=format:"%an")
          SHA=$(git log -1 --pretty=format:"%h")
          printf '%s' "$DIFF" | head -c 3000 > /tmp/commit_diff.txt
          printf '%s' "$COMMIT_MSG" > /tmp/commit_msg.txt
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "committer=$COMMITTER" >> "$GITHUB_OUTPUT"

      - name: Summarize with LLM
        id: summarize
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL != '' && secrets.LLM_BASE_URL || 'https://open.bigmodel.cn/api/coding/paas/v4' }}
        run: |
          RESPONSE=$(curl -s "$LLM_BASE_URL/chat/completions" \
            -H "Authorization: Bearer $LLM_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --rawfile diff /tmp/commit_diff.txt \
              --rawfile msg /tmp/commit_msg.txt \
              '{
                model: "GLM-4.7-FlashX",
                messages: [{
                  role: "system",
                  content: "Summarize this git commit concisely. What changed and why? Keep it to 2-3 sentences max. Use plain text, no markdown."
                }, {
                  role: "user",
                  content: "Commit message:\n\($msg)\n\nDiff:\n\($diff)"
                }],
                max_tokens: 300
              }')")
          echo "$RESPONSE" | jq -r '.choices[0].message.content // "Failed to summarize"' > /tmp/summary.txt
          echo "summary<<GITHUB_DELIM" >> "$GITHUB_OUTPUT"
          cat /tmp/summary.txt >> "$GITHUB_OUTPUT"
          echo "GITHUB_DELIM" >> "$GITHUB_OUTPUT"

      - name: Send to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          COMMIT_LINK="https://github.com/usr-undeleted/lash/commit/${{ steps.diff.outputs.sha }}"
          jq -n \
            --rawfile summary /tmp/summary.txt \
            --arg committer "${{ steps.diff.outputs.committer }}" \
            --arg sha "${{ steps.diff.outputs.sha }}" \
            --arg link "$COMMIT_LINK" \
            '{
              content: "**New commit by `\($committer)`**: `\($sha)` (\($link))\n\n\($summary)"
            }' | curl -s -H "Content-Type: application/json" -d @- "$DISCORD_WEBHOOK_URL"
